  {dialogue:[{speaker:'A',avatar:'👨',name:'Dad',text:'Your room is messy. Have you cleaned it yet?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Not yet. I haven't cleaned it yet.",correct:true},{text:"Not yet. I didn't clean it yet.",correct:false},{text:"Not yet. I haven't clean it yet.",correct:false}],explanation:"現在完成式否定：haven't + p.p.，注意 p.p. 是 cleaned，不是原形 clean。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:'This story was written by a famous writer, was it?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"No, it wasn't. It was written by an unknown author.",correct:true},{text:"No, it weren't. It was written by an unknown author.",correct:false},{text:"No, it isn't. It was written by an unknown author.",correct:false}],explanation:"Was it? 的否定回答是 No, it wasn't.，被動語態過去式 it 用 was/wasn't。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ken',text:"I called you yesterday, but you didn't answer. What were you doing?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Sorry, I was taking a shower at that time.',correct:true},{text:'Sorry, I took a shower at that time.',correct:false},{text:'Sorry, I am taking a shower at that time.',correct:false}],explanation:'was/were + Ving 是過去進行式，表示「當時正在做的事」，所以用 I was taking a shower。'},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Aunt',text:'You can speak Japanese very well, can you?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Actually, I can't speak it very well yet.",correct:true},{text:"Actually, I cannot speaks it very well yet.",correct:false},{text:"Actually, I am not speak it very well yet.",correct:false}],explanation:"can't 後面接原形動詞 speak（不加 s）。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:'Have you finished your report yet?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Not yet. I've only written the introduction.",correct:true},{text:"Not yet. I've only write the introduction.",correct:false},{text:"Not yet. I only wrote the introduction yet.",correct:false}],explanation:"現在完成式否定：I've only written（have + p.p.）。yet 用於現在完成式問句和否定句，不搭配過去簡單式。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Jake',text:'Have you heard? A new shopping mall is being built downtown.'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Really? How long has it been under construction?',correct:true},{text:'Really? How long has it been constructing?',correct:false},{text:'Really? How long did it under construction?',correct:false}],explanation:"has it been under construction 是現在完成式詢問持續狀態。under construction 是「施工中」的固定說法。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Mia',text:'Your English has improved so much! What is your secret?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I've been watching English movies every day.",correct:true},{text:"I've been watch English movies every day.",correct:false},{text:"I've watched English movies every day for watching.",correct:false}],explanation:"現在完成進行式：have/has been + Ving，強調持續進行的動作。I've been watching = I have been watching。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:'Why does the house smell so good?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Because Dad has been baking cookies for the past hour.",correct:true},{text:"Because Dad has baking cookies for the past hour.",correct:false},{text:"Because Dad was baking cookies since one hour.",correct:false}],explanation:"現在完成進行式 has been baking 表示「一直在烤」。for 表持續時間（for the past hour），since 表起點（since 3 o'clock）。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Mr. Green',text:'I heard you got a perfect score on the test!'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes! It's the best result I've ever gotten.",correct:true},{text:"Yes! It's the best result I ever got.",correct:false},{text:"Yes! It's the best result I've ever get.",correct:false}],explanation:"最高級 + I've ever + p.p. 是「有史以來最...」的固定句型。gotten 是 get 的過去分詞（美式英語）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Leo',text:'Did you manage to fix the computer?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Not yet. I've tried everything, but it still won't start.",correct:true},{text:"Not yet. I tried everything, but it still won't start.",correct:false},{text:"Not yet. I've tried everything, but it still doesn't started.",correct:false}],explanation:"I've tried everything 強調「試遍了所有方法」（結果仍未解決），用現在完成式表示與現在的關聯。won't start 表示「就是不肯啟動」。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Grace',text:'How many times have you been to Tainan?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I've been there three times. I love the food!",correct:true},{text:"I went there three times. I love the food!",correct:false},{text:"I've went there three times. I love the food!",correct:false}],explanation:"How many times have you been...? 問的是累積次數，用現在完成式回答：I've been（have been），不是 went 或 've went。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Ms. Lin',text:"The books in this room are used by students, aren't they?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, they are. Anyone can borrow them.",correct:true},{text:"Yes, they are used. Anyone can borrow them.",correct:false},{text:"Yes, they do. Anyone can borrow them.",correct:false}],explanation:"Are they used? 問的是被動語態的狀態，回答 Yes, they are.（be 動詞回應 be 動詞）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Kevin',text:'Was this bridge built a long time ago?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Yes, it was. It was built over a hundred years ago.',correct:true},{text:'Yes, it was. It was build over a hundred years ago.',correct:false},{text:'Yes, it did. It was built over a hundred years ago.',correct:false}],explanation:"Was it built? 過去被動回答：Yes, it was.（was/were + p.p.，p.p. 是 built，不是原形 build）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Aunt',text:"I love your new jacket. Where was it made?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'It was made in Italy. My mom gave it to me.',correct:true},{text:'It made in Italy. My mom gave it to me.',correct:false},{text:'It is made in Italy. My mom gave it to me.',correct:false}],explanation:"Where was it made? 問過去被動，回答也用過去被動 It was made in Italy.（不能省略 was）。"},
  {dialogue:[{speaker:'A',avatar:'👨‍🏫',name:'Mr. Park',text:"English is spoken by millions of people worldwide, isn't it?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, it is. It's one of the most widely used languages.",correct:true},{text:"Yes, it does. It's one of the most widely used languages.",correct:false},{text:"Yes, it speaks. It's one of the most widely used languages.",correct:false}],explanation:"is spoken 是現在被動語態，確認問答用 Yes, it is.（be 動詞對應 be 動詞）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Viv',text:'Oh no! My phone was stolen on the bus!'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"That's terrible! You should report it to the police right away.",correct:true},{text:"That's terrible! You should to report it to the police right away.",correct:false},{text:"That's terrible! You should reported it to the police right away.",correct:false}],explanation:"should + 原形動詞（report），不加 to，也不用過去式 reported。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Dan',text:"My bike was repaired by the mechanic this morning."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Great! Was it expensive to fix?',correct:true},{text:'Great! Did it expensive to fix?',correct:false},{text:'Great! Was it expensively to fix?',correct:false}],explanation:"Was it expensive? 問費用，expensive 是形容詞（不是副詞 expensively）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Lisa',text:"The package will be delivered tomorrow, won't it?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, that's what the tracking website says.",correct:true},{text:"Yes, that's what tracking website says.",correct:false},{text:"Yes, that's what the tracking website said it.",correct:false}],explanation:"the tracking website 需要定冠詞 the。says 是 what 子句的動詞（第三人稱單數加 s）。said it 多了受詞，what 已經是受詞。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Cora',text:"You've met my brother Sam before, haven't you?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, I have. We met at your birthday party last year.",correct:true},{text:"Yes, I did. We met at your birthday party last year.",correct:false},{text:"Yes, I have met. We met at your birthday party last year.",correct:false}],explanation:"haven't you? 的確認回答用 Yes, I have.（現在完成式 have 對應 have）。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"It's a beautiful day, isn't it?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, it is! Perfect weather for a picnic.",correct:true},{text:"Yes, it isn't! Perfect weather for a picnic.",correct:false},{text:"Yes, it does! Perfect weather for a picnic.",correct:false}],explanation:"isn't it? 是肯定句後的否定附加問句，確認同意時回答 Yes, it is.（不是 Yes, it isn't）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"You didn't leave the milk out overnight, did you?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Sorry, I did. I forgot to put it back.",correct:true},{text:"Sorry, I didn't. I forgot to put it back.",correct:false},{text:"Sorry, I left. I forgot to put it back.",correct:false}],explanation:"didn't...did you? 期待否定答案，但若事實上有做，則誠實回答 Yes, I did.（Sorry 表道歉，事實是有做）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ben',text:"Your sister doesn't like spicy food, does she?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Actually, she does. She loves hot sauce!",correct:true},{text:"Actually, she doesn't. She loves hot sauce!",correct:false},{text:"Actually, she is. She loves hot sauce!",correct:false}],explanation:"doesn't she? 預期否定，但若她其實喜歡，用 Yes, she does. / Actually, she does.（矛盾事實用肯定）。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Ms. Wang',text:"You've never tried durian, have you?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Actually, I have! I tried it once and loved it.",correct:true},{text:"Actually, I haven't! I tried it once and loved it.",correct:false},{text:"Actually, I did! I tried it once and loved it.",correct:false}],explanation:"have you? 是否定句後的附加問句，若事實上有（吃過），回答 Yes, I have.（現在完成式）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Abby',text:"The homework was due yesterday, wasn't it?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes, it was. Did you hand it in?",correct:true},{text:"Yes, it did. Did you hand it in?",correct:false},{text:"Yes, it is. Did you hand it in?",correct:false}],explanation:"was 是過去式 be 動詞，附加問句 wasn't it? 確認後回答 Yes, it was.（過去式 be 動詞）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Grandma',text:'You must have been exhausted after the marathon!'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'I was! I could barely walk afterward.',correct:true},{text:'I must! I could barely walk afterward.',correct:false},{text:'I was must! I could barely walk afterward.',correct:false}],explanation:"You must have been... 是「一定很...」的情態完成式推測。回答用 I was!（確認那個狀態）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ted',text:'I knocked on your door at noon but no one answered.'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Oh, I must have been sleeping. I was up late last night.',correct:true},{text:'Oh, I must have slept. I was up late last night.',correct:false},{text:'Oh, I should have been sleeping. I was up late last night.',correct:false}],explanation:"must have been sleeping 表示對過去某時刻行為的合理推測（一定當時正在睡覺）。must have + p.p. 是情態完成式推測。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:'Why did you miss the field trip last week?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'I had a fever. I should have told you sooner. Sorry.',correct:true},{text:'I had a fever. I should tell you sooner. Sorry.',correct:false},{text:'I had a fever. I should told you sooner. Sorry.',correct:false}],explanation:"should have told 是「過去應該做但沒有做」，用 should have + p.p.（told 是 tell 的 p.p.）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Pam',text:"Tom left his wallet at home again!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'He could have checked his bag before leaving!',correct:true},{text:'He could checked his bag before leaving!',correct:false},{text:'He could has checked his bag before leaving!',correct:false}],explanation:"could have + p.p. 表示「本來可以做但沒有做」。正確結構：could have checked（have 不變為 has）。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Dad',text:'I heard you failed the driving test.'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Yeah. I might have practiced more before taking it.',correct:true},{text:'Yeah. I might practiced more before taking it.',correct:false},{text:'Yeah. I might to have practiced more before taking it.',correct:false}],explanation:"might have + p.p. 表示「也許本來應該做」。might 後直接接 have（不加 to），再接 p.p.（practiced）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"Did you eat all the cake? I was saving it for the party!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I'm sorry! I didn't know. I shouldn't have eaten it.",correct:true},{text:"I'm sorry! I didn't know. I shouldn't eat it.",correct:false},{text:"I'm sorry! I didn't know. I shouldn't have eat it.",correct:false}],explanation:"shouldn't have eaten 表示「過去不應該做但做了」。p.p. 是 eaten（eat → ate → eaten，三態變化）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ron',text:'Where were you during the earthquake yesterday?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'I was hiding under my desk when it happened.',correct:true},{text:'I hid under my desk when it was happening.',correct:false},{text:'I was hide under my desk when it happened.',correct:false}],explanation:"過去進行式 was hiding 表示「地震時正在躲」。when 引導的過去式 it happened 是短暫事件，打斷正在進行的動作。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Nora',text:"What was the teacher explaining when you came in late?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'She was explaining how to solve quadratic equations.',correct:true},{text:'She explained how to solve quadratic equations.',correct:false},{text:'She was explain how to solve quadratic equations.',correct:false}],explanation:"was explaining 是過去進行式（was + Ving），表示「我進來時，她正在解說」。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"Why didn't you answer when I called your name?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Sorry! I was thinking about something else.',correct:true},{text:'Sorry! I thought about something else.',correct:false},{text:'Sorry! I were thinking about something else.',correct:false}],explanation:"was thinking 是過去進行式（主詞 I 用 was，不是 were）。表示「當時正在想別的事」。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Will',text:'Did you see the accident on the way to school?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Yes! Two cars crashed into each other just as I was walking by.',correct:true},{text:'Yes! Two cars were crashing into each other when I walked by.',correct:false},{text:'Yes! Two cars was crashing into each other when I walked by.',correct:false}],explanation:"just as I was walking by（我正走過時）是過去進行式背景，crashed（撞上）是突發短暫動作用過去簡單式。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Aunt',text:"You look pale. Are you all right?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I'm okay. I was working until midnight last night.",correct:true},{text:"I'm okay. I worked until midnight last night.",correct:false},{text:"I'm okay. I am working until midnight last night.",correct:false}],explanation:"was working until midnight 強調「昨晚一直工作到半夜」（過去進行式表示持續進行的動作）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Ivy',text:'If you could travel anywhere, where would you go?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I would go to Iceland to see the Northern Lights.",correct:true},{text:"I will go to Iceland to see the Northern Lights.",correct:false},{text:"I would went to Iceland to see the Northern Lights.",correct:false}],explanation:"If + 過去式（could），主句用 would + 原形動詞（would go）。這是第二類條件句（假設語氣）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Sam',text:'If it rains this Saturday, will the game be canceled?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Yes, it will be postponed to next weekend.',correct:true},{text:'Yes, it would be postponed to next weekend.',correct:false},{text:'Yes, it will postpone to next weekend.',correct:false}],explanation:"If + 現在式，主句用 will + 原形動詞（第一類條件句，真實可能）。被動：will be postponed。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:'What will you do if you pass the exam?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"If I pass, I'll treat my friends to dinner!",correct:true},{text:"If I will pass, I'll treat my friends to dinner!",correct:false},{text:"If I pass, I would treat my friends to dinner!",correct:false}],explanation:"if 子句用現在式（pass），主句用 will（I'll = I will）。if 子句不用 will，主句不用 would（那是假設）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Cara',text:'What would happen if there were no internet?'},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:'Life would be very different and much slower.',correct:true},{text:'Life will be very different and much slower.',correct:false},{text:'Life would very different and much slower.',correct:false}],explanation:"If + were（假設），主句用 would + 原形動詞（would be）。be 動詞不能省略，主句不用 will。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Uncle',text:"I might visit next month. If I come, can we go hiking?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Of course! If you come, we'll definitely go.",correct:true},{text:"Of course! If you will come, we'll definitely go.",correct:false},{text:"Of course! If you come, we would definitely go.",correct:false}],explanation:"if 子句用現在式（you come），主句用 will（we'll go）。這是第一類真實條件句。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"If you had studied harder, you would have passed."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I know. I really should have prepared better.",correct:true},{text:"I know. I really should prepare better.",correct:false},{text:"I know. I really should have prepare better.",correct:false}],explanation:"對過去事實的遺憾：should have + p.p.（prepared）。prepared 是 prepare 的過去分詞。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Art',text:"Excuse me, can you tell me where the nearest bank is?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Sure. It's about two blocks down this street on the left.",correct:true},{text:"Sure. It's about two blocks down on left of this street.",correct:false},{text:"Sure. It about two blocks down this street on the left.",correct:false}],explanation:"on the left 是「在左邊」的固定說法（the 不可省）。It's（= It is）不能省略 be 動詞。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Eva',text:"Do you know when the next bus arrives?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I'm not sure. Let me check the schedule.",correct:true},{text:"I'm not sure. Let me to check the schedule.",correct:false},{text:"I'm not sure. Let me checking the schedule.",correct:false}],explanation:"Let me + 原形動詞（check），不加 to，也不用 Ving（checking）。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Ms. Chen',text:"Could you tell me how long the exam will last?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"It will last for about ninety minutes.",correct:true},{text:"It will lasts for about ninety minutes.",correct:false},{text:"It will last about for ninety minutes.",correct:false}],explanation:"will + 原形動詞（last），不加 s。for 放在時間長度前（last for ninety minutes），介系詞位置固定在時間前。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Eric',text:"I wonder if you've seen my keys anywhere."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I think I saw them on the kitchen counter.",correct:true},{text:"I think I saw it on the kitchen counter.",correct:false},{text:"I think I see them on the kitchen counter.",correct:false}],explanation:"keys 是複數，代名詞用 them（不是 it）。看到的是過去的事，用過去式 saw（不是 see）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Grandma',text:"I'm not sure whether to take the train or the bus."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"The train is faster, but the bus is more comfortable.",correct:true},{text:"The train is more faster, but the bus is more comfortable.",correct:false},{text:"The train is fastest, but the bus is more comfortable.",correct:false}],explanation:"fast 的比較級是 faster（單音節加 -er），不說 more faster（雙重比較錯誤）。比較兩者用比較級，不用最高級。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Nadia',text:"Please tell me what time the library closes."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I believe it closes at nine on weekdays.",correct:true},{text:"I believe it closes at nine in weekdays.",correct:false},{text:"I believe it close at nine on weekdays.",correct:false}],explanation:"on weekdays 是「在平日」（on + 複數時間詞）。第三人稱單數 it 的動詞加 s：closes。"},
  {dialogue:[{speaker:'A',avatar:'👨‍🏫',name:'Mr. Ray',text:"Can anyone explain why water boils at 100 degrees?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"It's because of the atmospheric pressure at sea level.",correct:true},{text:"It because of the atmospheric pressure at sea level.",correct:false},{text:"It's because the atmospheric pressure at sea level.",correct:false}],explanation:"因果關係：It's because of + 名詞（because of + 名詞），或 because + 子句。不能省略 be 動詞，也不能在 because 後直接接名詞（那是 because of）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Aunt',text:"The book that you recommended was excellent!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I'm glad you liked it. It's one of my favorites.",correct:true},{text:"I'm glad you liked it. It's one of my favorite.",correct:false},{text:"I'm glad you like it. It's one of my favorites.",correct:false}],explanation:"one of my favorites（我最喜歡的之一）—one of 後接複數名詞。過去式 you liked it（說明是談論剛讀完的書）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Cole',text:"The girl who sits next to me in class is very talented."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Oh, I know her! She plays the violin beautifully.",correct:true},{text:"Oh, I know her! She play the violin beautifully.",correct:false},{text:"Oh, I know she! She plays the violin beautifully.",correct:false}],explanation:"know her（認識她）—受格用 her，不是主格 she。第三人稱單數 she plays（動詞加 s）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Rosa',text:"The movie that we watched last night had a surprise ending."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I know! I didn't expect it at all.",correct:true},{text:"I know! I didn't expected it at all.",correct:false},{text:"I know! I wasn't expect it at all.",correct:false}],explanation:"didn't + 原形動詞（expect）。didn't expected 是雙重過去式錯誤，wasn't expect 則 was 不能搭配原形動詞。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"The student whose project won the prize was very surprised."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes! I didn't think her project was that impressive.",correct:true},{text:"Yes! I didn't thought her project was that impressive.",correct:false},{text:"Yes! I don't think her project was that impressive.",correct:false}],explanation:"didn't + 原形動詞 think（過去簡單式否定）。描述過去的想法用過去式，所以不是 don't think。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Eli',text:"Is there anyone in this class who speaks French?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I think Amy does. She studied in Paris for a year.",correct:true},{text:"I think Amy does. She studied in Paris since a year.",correct:false},{text:"I think Amy is. She studied in Paris for a year.",correct:false}],explanation:"Does she speak French? 的強調回答用 does。for a year 表示時間長度（for + 期間），since 用於起點（since 2020）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"The restaurant where we had your birthday dinner closed down."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"What a shame! The food there was always so good.",correct:true},{text:"What a shame! The food there were always so good.",correct:false},{text:"What a shame! The food there was always very well.",correct:false}],explanation:"food 是不可數單數名詞，be 動詞用 was。形容食物好吃用 good（形容詞），不用 well（副詞，修飾動作）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Suki',text:"I enjoy reading books that are based on true stories."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Me too! I find them more interesting than fiction.",correct:true},{text:"Me too! I find them more interesting than fictionally.",correct:false},{text:"Me too! I find them more interest than fiction.",correct:false}],explanation:"more interesting than 是比較級（interesting 多音節，用 more）。fiction 是名詞，不用副詞形式 fictionally。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Dad',text:"Remember to stop talking and start focusing on your work."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Sorry, I'll stop chatting and focus right now.",correct:true},{text:"Sorry, I'll stop to chat and focus right now.",correct:false},{text:"Sorry, I'll stop chatting and to focus right now.",correct:false}],explanation:"stop + Ving = 停止做某事（stop chatting）。stop to do = 停下來去做另一件事。focus 和 chatting 為 and 連接的並列，形式一致（stop chatting and focus）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Ann',text:"Did you remember to lock the door when you left?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Oh no! I forgot to lock it. We need to go back.",correct:true},{text:"Oh no! I forgot locking it. We need to go back.",correct:false},{text:"Oh no! I forgot lock it. We need to go back.",correct:false}],explanation:"forget to + 原形動詞 = 忘記去做（未做）。forget Ving = 忘記曾經做過的事。這裡是「忘記去鎖」（沒鎖），所以用 forgot to lock。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ian',text:"How about trying a new restaurant tonight?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Sounds fun! I've been wanting to try Thai food.",correct:true},{text:"Sounds fun! I've been want to try Thai food.",correct:false},{text:"Sounds fun! I'm wanting to try Thai food.",correct:false}],explanation:"have been wanting 是現在完成進行式（have been + Ving）表達持續的願望。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Ms. Park',text:"I need someone to help me carry these boxes."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I'll help you! Where do you need them?",correct:true},{text:"I'll help you! Where do you need it?",correct:false},{text:"I'll help you! Where you need them?",correct:false}],explanation:"boxes 是複數，代名詞用 them（不是 it）。疑問句語序：Where do you need them?（助動詞 do 在主詞前）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Lisa',text:"My older sister has decided to study abroad next year."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"That's exciting! Which country has she chosen?",correct:true},{text:"That's exciting! Which country she has chosen?",correct:false},{text:"That's exciting! Which country did she has chosen?",correct:false}],explanation:"疑問句語序：疑問詞 + 助動詞 has + 主詞 she + p.p. chosen（現在完成式疑問句）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Finn',text:"By the time we arrived at the cinema, the movie had already started."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"That's too bad! Did you still go in?",correct:true},{text:"That's too bad! Did you still went in?",correct:false},{text:"That's too bad! Have you still gone in?",correct:false}],explanation:"Did you + 原形動詞（go）。過去時間事件用過去簡單式問句 Did you...?，不用 went 或現在完成式。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Fay',text:"We hadn't eaten anything all day when we finally found a restaurant."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"You must have been starving! What did you order?",correct:true},{text:"You must have starved! What did you order?",correct:false},{text:"You must be starving! What did you order?",correct:false}],explanation:"must have been starving 是情態完成進行式，推測「當時一定很餓」。must be starving 是現在推測，時態不符。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"Before I got home, the kids had already cleaned the house!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Wow, they must have worked really hard!",correct:true},{text:"Wow, they must work really hard!",correct:false},{text:"Wow, they must have work really hard!",correct:false}],explanation:"must have worked 是情態完成式（must have + p.p.），推測過去的行為。worked 是過去分詞。"},
  {dialogue:[{speaker:'A',avatar:'👨‍🏫',name:'Mr. Lim',text:"I realized I had left my phone at home after I arrived at school."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Oh no! Did you go back to get it?",correct:true},{text:"Oh no! Did you went back to get it?",correct:false},{text:"Oh no! Have you gone back to get it?",correct:false}],explanation:"Did you + 原形動詞 go（過去事件的問句）。went 不接在 did 後。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Zac',text:"When I called her, she had already left the office."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"So did you leave a message?",correct:true},{text:"So did you left a message?",correct:false},{text:"So have you left a message?",correct:false}],explanation:"過去事件的問句用 Did you + 原形動詞（leave）。left 不能接在 did 後。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Bea',text:"The concert had been going on for two hours before we arrived."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Oh! Did you miss the opening acts then?",correct:true},{text:"Oh! Did you missed the opening acts then?",correct:false},{text:"Oh! Had you missed the opening acts then?",correct:false}],explanation:"詢問過去發生的具體事件用 Did you + 原形動詞 miss。missed 不能接在 did 後。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"Please make sure your essays are submitted before Friday."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Understood! Can we submit them by email?",correct:true},{text:"Understood! Can we submit it by email?",correct:false},{text:"Understood! Can we submits them by email?",correct:false}],explanation:"essays 是複數，代名詞 them。can 後接原形動詞 submit（不加 s）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Ray',text:"Your presentation was great! You must have practiced a lot."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Thanks! I practiced for three hours every night this week.",correct:true},{text:"Thanks! I practiced since three hours every night this week.",correct:false},{text:"Thanks! I have practiced for three hours every night this week.",correct:false}],explanation:"every night this week 配合過去簡單式（practiced）。for 表示持續的時間長度。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Dot',text:"I'm not sure what to buy for my dad's birthday."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"How about getting him a book? He loves reading.",correct:true},{text:"How about to get him a book? He loves reading.",correct:false},{text:"How about get him a book? He loves reading.",correct:false}],explanation:"How about + Ving（getting）。不能接 to get 或直接接原形 get。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Grandma',text:"You are the most hardworking student I have ever taught."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Thank you so much! That means a lot to me.",correct:true},{text:"Thank you so much! That mean a lot to me.",correct:false},{text:"Thank you so much! That means lot to me.",correct:false}],explanation:"That means a lot to me.（那對我意義重大）—主詞 That（單數）動詞 means 加 s。a lot 前需要冠詞 a。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Arlo',text:"I've never seen such a beautiful sunset before!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Neither have I. It's absolutely stunning.",correct:true},{text:"Neither I have. It's absolutely stunning.",correct:false},{text:"Me neither have. It's absolutely stunning.",correct:false}],explanation:"Neither have I. 是「我也沒有」的倒裝句型（Neither + 助動詞 + 主詞）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Hailey',text:"I enjoy cooking, but I'm not very good at it."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Practice makes perfect! You'll get better over time.",correct:true},{text:"Practice makes perfect! You get better over time.",correct:false},{text:"Practice make perfect! You'll get better over time.",correct:false}],explanation:"Practice makes perfect. 是諺語（Practice 是主詞，單數，makes 加 s）。You'll（= You will）表示未來的進步。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Uncle',text:"Do you know what your strengths and weaknesses are?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I think I'm good at working with others, but I need to improve my time management.",correct:true},{text:"I think I'm good at work with others, but I need to improve my time management.",correct:false},{text:"I think I'm good in working with others, but I need to improve my time management.",correct:false}],explanation:"be good at + Ving（good at working）。at 是固定介系詞，不是 in。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Ms. Kim',text:"I'd like you to write a short paragraph about your goals."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Sure! Should I write about my academic or career goals?",correct:true},{text:"Sure! Should I write about my academic or career goal?",correct:false},{text:"Sure! Should I write on my academic or career goals?",correct:false}],explanation:"goals（複數）表達多個目標。write about（寫關於...）是固定搭配，不是 write on。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Cal',text:"What do you think is the most important quality in a friend?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I think honesty is the most important. Without trust, friendship doesn't last.",correct:true},{text:"I think honesty is most important. Without trust, friendship doesn't last.",correct:false},{text:"I think honesty is the most importantly. Without trust, friendship doesn't last.",correct:false}],explanation:"最高級前要有定冠詞 the（the most important）。important 是形容詞（不用副詞 importantly）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Lea',text:"Have you decided what club to join this semester?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Not yet. I'm still trying to decide between the debate club and the art club.",correct:true},{text:"Not yet. I'm still trying to decide among the debate club and the art club.",correct:false},{text:"Not yet. I'm still trying to decide between the debate club or the art club.",correct:false}],explanation:"between 用於兩者之間（between A and B），among 用於三者以上。between...and（不是 between...or）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Mom',text:"You look tired. Why don't you take a break?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I would, but I have a deadline to meet.",correct:true},{text:"I would, but I have a deadline to meeting.",correct:false},{text:"I would, but I have a deadline meeting.",correct:false}],explanation:"have a deadline to meet 是 have + 名詞 + to + 原形動詞（不定詞作後置修飾）。meet（不是 meeting）。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Rex',text:"I've been feeling really stressed lately."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Have you tried talking to someone about it? It really helps.",correct:true},{text:"Have you tried to talk to someone about it? It really helps.",correct:false},{text:"Have you tried talk to someone about it? It really helps.",correct:false}],explanation:"try + Ving = 嘗試做（試試看某方法）。try to + 原形 = 努力設法做。這裡是「試著聊聊看」，所以用 tried talking。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Mel',text:"I can't decide whether to take the science track or the arts track."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Think about what subjects you enjoy most. That should help you decide.",correct:true},{text:"Think about what subjects you enjoy most. That should help you to decided.",correct:false},{text:"Think about what subjects you enjoy most. That should helps you decide.",correct:false}],explanation:"help + 受詞 + 原形動詞（help you decide），不加 to。should 後接原形 help（不是 helps）。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Aunt',text:"You seem to know a lot about cooking!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I've been learning from my mom since I was little.",correct:true},{text:"I've been learning from my mom since I am little.",correct:false},{text:"I'm learning from my mom since I was little.",correct:false}],explanation:"since I was little 是從小到現在，since 後接過去式（was）。have been learning（現在完成進行式）表示持續至今。"},
  {dialogue:[{speaker:'A',avatar:'👨‍🏫',name:'Mr. Ho',text:"Your score has improved a lot this term!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Thank you! I've been putting in a lot more effort.",correct:true},{text:"Thank you! I've been put in a lot more effort.",correct:false},{text:"Thank you! I put in a lot more effort this term.",correct:false}],explanation:"have been putting 是現在完成進行式（have been + Ving），強調這個學期一直持續的努力。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Milo',text:"What's the best piece of advice you've ever received?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Never give up, no matter how difficult things get.",correct:true},{text:"Never give up, no matter how things get difficult.",correct:false},{text:"Never give up, no matter how difficult things gets.",correct:false}],explanation:"no matter how + 形容詞 + 主詞 + 動詞（how difficult things get）—語序固定，形容詞在主詞前。things 是複數，動詞 get 不加 s。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"Which do you find more challenging—speaking or writing in English?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I find speaking more challenging because I'm worried about making mistakes.",correct:true},{text:"I find speaking more challenging because I'm worry about making mistakes.",correct:false},{text:"I find speaking more challengingly because I'm worried about making mistakes.",correct:false}],explanation:"find + 受詞 + 形容詞（more challenging），不是副詞 challengingly。worried 是形容詞（I'm worried），不是動詞形式 worry。"},
  {dialogue:[{speaker:'A',avatar:'👩',name:'Grandma',text:"It's getting late. You had better go home before dark."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"You're right. I had better leave now.",correct:true},{text:"You're right. I had better to leave now.",correct:false},{text:"You're right. I better leave now.",correct:false}],explanation:"had better + 原形動詞（leave），不加 to，也不省略 had。這是強烈建議的固定句型。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Nick',text:"I used to hate vegetables when I was a child."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Really? I used to feel the same way, but now I love them.",correct:true},{text:"Really? I use to feel the same way, but now I love them.",correct:false},{text:"Really? I was used to feel the same way, but now I love them.",correct:false}],explanation:"used to + 原形動詞 表示「過去習慣（現在不再）」，固定形式是 used to（不是 use to，也不是 was used to feel）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Gwen',text:"Are you used to living in the city now?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Pretty much. I'm getting used to the noise and the traffic.",correct:true},{text:"Pretty much. I'm getting used to live with the noise.",correct:false},{text:"Pretty much. I'm used to live in the city.",correct:false}],explanation:"be/get used to + Ving（getting used to the noise）。to 是介系詞，後接名詞或動名詞，不接原形動詞。"},
  {dialogue:[{speaker:'A',avatar:'👨‍🏫',name:'Mr. Chen',text:"It is said that reading improves your writing skills."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I believe so. I try to read at least one book a month.",correct:true},{text:"I believe so. I try reading at least one book a month.",correct:false},{text:"I believe so. I try to read at least one book in a month.",correct:false}],explanation:"try to + 原形動詞 = 努力嘗試去做（try reading = 試試看讀，語意略不同）。a month 是固定說法（每個月），不說 in a month。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Joel',text:"My parents want me to become a doctor."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"And what do you want? It's your life, after all.",correct:true},{text:"And what do you want? It's yours life, after all.",correct:false},{text:"And what do you want? It's you life, after all.",correct:false}],explanation:"your life（你的生活）—your 是所有格形容詞，後接名詞。yours 是獨立所有代名詞（後不接名詞）。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Alice',text:"I'm thinking of quitting the swim team. It takes up too much time."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Are you sure? You've worked so hard to get where you are.",correct:true},{text:"Are you sure? You worked so hard to get where you are.",correct:false},{text:"Are you sure? You've work so hard to get where you are.",correct:false}],explanation:"You've worked（現在完成式 have + p.p.）強調到目前為止累積的努力。p.p. 是 worked，不是原形 work。"},
  {dialogue:[{speaker:'A',avatar:'👨',name:'Dad',text:"Next time you borrow something, remember to return it promptly."},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I will. I'm sorry I kept it for so long.",correct:true},{text:"I will. I'm sorry I've kept it since so long.",correct:false},{text:"I will. I'm sorry I keep it for so long.",correct:false}],explanation:"kept 是過去簡單式（keep 的過去式），表示已結束的狀況。for so long 表時間長度，since 用於起點（since last week），不是 since so long。"},
  {dialogue:[{speaker:'A',avatar:'👩‍🏫',name:'Teacher',text:"Has anyone here ever participated in a public speaking competition?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"Yes! I participated in one last year and won second place.",correct:true},{text:"Yes! I have participated in one last year and won second place.",correct:false},{text:"Yes! I participated in one last year and win second place.",correct:false}],explanation:"last year 是明確過去時間點，用過去簡單式 participated（不用現在完成式）。win 的過去式是 won。"},
  {dialogue:[{speaker:'A',avatar:'👦',name:'Kai',text:"Do you prefer working alone or with a group?"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"It depends on the task. I prefer working alone for creative projects.",correct:true},{text:"It depends of the task. I prefer working alone for creative projects.",correct:false},{text:"It depends on the task. I prefer work alone for creative projects.",correct:false}],explanation:"depend on（取決於）是固定介系詞搭配，不是 depend of。prefer + Ving（working）表達一般偏好，不接原形 work。"},
  {dialogue:[{speaker:'A',avatar:'👧',name:'Petra',text:"I can hardly believe how fast this year has gone by!"},{speaker:'B',avatar:'🧒',name:'You',text:'___',isQuestion:true}],options:[{text:"I know! It feels like we just started, and now it's almost over.",correct:true},{text:"I know! It feels as we just started, and now it's almost over.",correct:false},{text:"I know! It feels like we just start, and now it's almost over.",correct:false}],explanation:"It feels like + 子句（feels like we just started）。started 是過去式，表「就像剛開始一樣」。feels as 不是正確說法。"},

const params = new URLSearchParams(window.location.search);
const difficulty = params.get('difficulty') || 'basic';
const QUESTION_BANK = difficulty === 'gept' ? GEPT_Q : difficulty === 'advanced' ? ADVANCED_Q : BASIC_Q;

if(difficulty !== 'basic'){
  document.body.classList.add(difficulty);
  document.getElementById('modeTag').textContent = difficulty === 'gept' ? '🎯 英檢初級挑戰' : '⚡ 高階版';
  document.getElementById('headerSub').textContent = difficulty === 'gept' ? '模擬真實生活情境（電話、購物、問路），選出最自然的回應！' : '模擬英檢初級對話情境，選出最自然的回應！';
  document.getElementById('optionsLabel').textContent = difficulty === 'gept' ? '選出最自然、最道地的回應：' : '你會怎麼回答？';
  document.getElementById('backBtn').href = `index.html?difficulty=${difficulty}`;
  document.getElementById('homeBtn').href = `index.html?difficulty=${difficulty}`;
}

let questions=[],current=0,score=0,correctCount=0,wrongCount=0,answered=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderQuestion(){
  const q=questions[current];answered=false;
  document.getElementById('questionNum').textContent=`題目 ${current+1} / ${questions.length}`;
  document.getElementById('progressFill').style.width=`${(current/questions.length)*100}%`;

  // Context box
  const ctxBox=document.getElementById('contextBox');
  if(q.context){ctxBox.innerHTML=`<span class="context-icon">📌</span>${q.context}`;ctxBox.className='context-box show';}
  else{ctxBox.className='context-box';}

  const dialogueBox=document.getElementById('dialogueBox');dialogueBox.innerHTML='';
  q.dialogue.forEach(line=>{
    const isRight=line.speaker==='B';
    const row=document.createElement('div');row.className='bubble-row'+(isRight?' right':'');
    const avatar=document.createElement('div');avatar.className=`avatar avatar-${line.speaker==='A'?'a':line.speaker==='B'?'b':'c'}`;avatar.textContent=line.avatar;
    const col=document.createElement('div');col.className='bubble-col'+(isRight?' right':'');
    const name=document.createElement('div');name.className='speaker-name';name.textContent=line.name;
    const bubble=document.createElement('div');
    bubble.className='bubble '+(isRight?(line.isQuestion?'question-bubble':'bubble-right'):'bubble-left');
    bubble.textContent=line.text;col.appendChild(name);col.appendChild(bubble);row.appendChild(avatar);row.appendChild(col);dialogueBox.appendChild(row);
  });

  const optsEl=document.getElementById('optionsEl');optsEl.innerHTML='';
  const letters=['A','B','C'];const shuffled=shuffle(q.options);
  shuffled.forEach((opt,i)=>{
    const btn=document.createElement('button');btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick=()=>checkAnswer(opt.correct,btn,shuffled);optsEl.appendChild(btn);
  });
  document.getElementById('feedbackEl').className='feedback';
  document.getElementById('feedbackText').textContent='';document.getElementById('explanationEl').textContent='';
  document.getElementById('btnNext').className='btn-next';
}

function checkAnswer(isCorrect,btn,shuffledOpts){
  if(answered)return;answered=true;
  document.querySelectorAll('.option-btn').forEach((b,i)=>{b.disabled=true;if(shuffledOpts[i].correct)b.className='option-btn correct-ans';else if(b===btn&&!isCorrect)b.className='option-btn wrong-ans';});
  const fb=document.getElementById('feedbackEl');const q=questions[current];
  if(isCorrect){score+=10;correctCount++;fb.className='feedback correct show';document.getElementById('feedbackIcon').textContent='🎉';document.getElementById('feedbackText').textContent='答對了！對話選得很好！';spawnConfetti(6);}
  else{wrongCount++;fb.className='feedback wrong show';document.getElementById('feedbackIcon').textContent='😅';document.getElementById('feedbackText').textContent='答錯了！看看綠色的正確答案。';}
  document.getElementById('explanationEl').textContent=q.explanation;
  document.getElementById('scoreDisplay').textContent=score;document.getElementById('correctDisplay').textContent=correctCount;document.getElementById('wrongDisplay').textContent=wrongCount;
  document.getElementById('btnNext').className='btn-next visible';
}

function nextQuestion(){current++;if(current>=questions.length)showResult();else renderQuestion();}

function showResult(){
  document.getElementById('questionCard').style.display='none';document.getElementById('resultScreen').classList.add('show');
  const accuracy=Math.round((correctCount/questions.length)*100);
  document.getElementById('resultScore').textContent=score+' 分';document.getElementById('rCorrect').textContent=correctCount;
  document.getElementById('rWrong').textContent=wrongCount;document.getElementById('rAccuracy').textContent=accuracy+'%';
  document.getElementById('progressFill').style.width='100%';
  let emoji,title,msg;
  if(accuracy>=90){emoji='🏆';title=difficulty==='gept'?'生活英語達人！':'英檢對話達人！';msg=difficulty==='gept'?'真實情境對話難不倒你，英語溝通能力超強！':'英檢初級對話難不倒你！';}
  else if(accuracy>=70){emoji='⭐';title='做得很好！';msg='大部分對話都選對了，繼續加油！';}
  else if(accuracy>=50){emoji='💪';title='不錯喔！';msg='再練習幾次，你一定能更進步！';}
  else{emoji='📚';title='繼續努力！';msg='多讀對話幾次，你會越來越棒的！';}
  document.getElementById('resultEmoji').textContent=emoji;document.getElementById('resultTitle').textContent=title;document.getElementById('resultMsg').textContent=msg;
  if(accuracy>=70)spawnConfetti(20);
}

function restart(){
  current=0;score=0;correctCount=0;wrongCount=0;
  questions=shuffle(QUESTION_BANK);
  document.getElementById('scoreDisplay').textContent=0;document.getElementById('correctDisplay').textContent=0;document.getElementById('wrongDisplay').textContent=0;
  document.getElementById('resultScreen').classList.remove('show');document.getElementById('questionCard').style.display='';renderQuestion();
}

const CONFETTI_COLORS=['#FF7043','#AB47BC','#4FC3F7','#FFD54F','#66BB6A','#FF4081'];
function spawnConfetti(n){for(let i=0;i<n;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];el.style.animationDuration=(1.5+Math.random()*1.5)+'s';el.style.animationDelay=Math.random()*0.5+'s';el.style.width=el.style.height=(8+Math.random()*8)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);},i*80);}}

questions=shuffle(QUESTION_BANK);renderQuestion();
</script>
